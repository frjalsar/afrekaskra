providers = ["...", "python"]

[phases.setup]
aptPkgs = ['...', 'tdsodbc', 'unixodbc-dev', 'libodbc1', 'unixodbc-common']
nixPkgs = ['...', 'nginx', 'unixODBCDrivers.mysql']

[phases.build]
cmd = ['npm run build', 'pip install -r requirements.txt', 'cp config/nginx.conf /etc/nginx/']

[start]
cmd = '(echo "Stuff"); (find / -name "libodbc.so.2"); (echo "Starting gunicorn"); (gunicorn -c /app/config/gunicorn.conf.py Sif.wsgi &); (sleep 2); (echo "Starting nginx"); nginx -c /app/config/nginx.conf'