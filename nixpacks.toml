providers = ["...", "python"]

[phases.setup]
nixPkgs = ['...', 'nginx']

[phases.build]
cmd = ['npm run build', 'pip install -r requirements.txt', 'cp config/nginx.conf.erb /etc/nginx/', 'mkdir -p /var/log/nginx/']

[start]
cmd = '(echo "Starting gunicorn"); (gunicorn -c /app/config/gunicorn.conf.py Sif.wsgi &); (sleep 2); (echo "Starting nginx"); nginx'