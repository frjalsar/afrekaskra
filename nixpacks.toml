providers = ["...", "python"]

[phases.setup]
nixPkgs = ['...', 'nginx']
aptPkgs = ['...', 'tdsodbc']

[phases.build]
cmd = ['npm run build', 'pip install -r requirements.txt', 'cp config/nginx.conf /etc/nginx/']

[start]
cmd = '(echo "Starting gunicorn"); (gunicorn -c /app/config/gunicorn.conf.py Sif.wsgi &); (sleep 2); (echo "Starting nginx"); nginx -c /app/config/nginx.conf'